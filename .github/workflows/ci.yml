name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  check-windows:
    name: Check (Windows)
    # Pinned to windows-2022: windows-latest moved to a newer MSVC toolchain
    # (Visual Studio 18 / MSVC 14.51) that the rustls `aws-lc-sys` C build can't
    # drive yet via its pinned cmake/cc ("C atomics require C11 or later";
    # "couldn't determine visual studio generator"). The 2022 image's VS2022
    # toolchain builds it cleanly. Revisit once aws-lc-sys/cmake/cc catch up.
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # Compile-only check to catch platform-gated drift (e.g. the
      # #[cfg(not(target_os = "windows"))] socket2 path in server/http.rs)
      # without running the full Unix-oriented test suite on Windows.
      - name: Cargo check
        run: cargo check --all-targets --all-features

  msrv:
    name: MSRV (1.84)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Pin the declared MSRV (rust-version = "1.84" in Cargo.toml) so a break
      # — e.g. from a dependency bump or a newer std/edition API — fails here at
      # PR time instead of only at the rust:1.84 release Docker build. Checks the
      # shipped crate (lib + bins); dev-deps (criterion/proptest/reqwest) are
      # excluded since their MSRVs aren't part of rucho's contract.
      - name: Install Rust 1.84
        uses: dtolnay/rust-toolchain@1.84.0

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-msrv-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-msrv-

      - name: Cargo check on MSRV
        run: cargo check --all-features

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --all-features

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release
        run: cargo build --release

  deb:
    name: Debian Package
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build .deb package
        run: cargo deb

      - name: Verify .deb was produced
        run: ls -lh target/debian/*.deb

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      # Fast amd64-only sanity build on PRs. The multi-arch (amd64+arm64) image
      # is built and pushed by release.yml at release time — the slow emulated
      # arm64 build runs once per release on a free runner, not on every PR.
      - name: Build Docker image
        run: docker build -t rucho:ci-test .
